<!DOCTYPE html>
<html lang="nl">
<head>
    <base href="../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offerte Aanvragen | We Care Safety</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#4ac6e8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <script src="https://www.google.com/recaptcha/enterprise.js?render=6LcZ08gsAAAAAFY6izOFURyVKbJDlH15dP3wzFsr"></script>

    <style>
        /* =========================================
           BASIS STIJLEN & VARIABELEN
           ========================================= */
        :root {
            --brand-blue: #4CC6E9;
            --dark-navy: #001D3D;
            --white: #ffffff;
            --input-bg: #f1f4f8; 
            --text-gray: #57636c;
            --border-color: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--white);
            -webkit-font-smoothing: antialiased;
        }

        /* =========================================
           OFFERTE PAGINA STIJLEN
           ========================================= */
        .offerte-section {
            padding: 80px 0 150px 0;
        }

        .offerte-container {
            width: 100%;
            max-width: 1050px;
            margin: 0 auto;
            padding: 0 30px;
        }

        .offerte-form-wrapper {
            max-width: 700px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--dark-navy);
            margin-top: 0;
            margin-bottom: 40px;
        }

        .form-section {
            margin-bottom: 35px;
        }

        .form-label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            color: var(--dark-navy);
            margin-bottom: 12px;
        }

        .form-control {
            width: 100%;
            padding: 16px 15px;
            border: none;
            background-color: var(--input-bg);
            border-radius: 0; 
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--dark-navy);
            box-sizing: border-box;
            transition: background-color 0.2s ease;
        }

        .form-control::placeholder {
            color: #8b95a1; 
        }

        .form-control:focus {
            outline: none;
            background-color: #e2e8f0;
        }

        .mb-15 {
            margin-bottom: 15px;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 140px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* KVK Zoekveld Layout */
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group .form-control {
            margin-bottom: 0; /* Zorgt dat het gelijk loopt met de knop */
        }

        .btn-search {
            background-color: var(--dark-navy);
            color: var(--white);
            border: none;
            padding: 0 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s ease;
            white-space: nowrap; /* Voorkomt dat tekst op 2 regels komt */
        }

        .btn-search:hover {
            opacity: 0.85;
        }

        .custom-select-wrapper {
            position: relative;
        }

        .custom-select-wrapper select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            cursor: pointer;
            padding-right: 40px; 
        }

        .custom-select-wrapper::after {
            content: '\f078'; 
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b95a1;
            pointer-events: none; 
        }

        /* =========================================
           CUSTOM CHECKBOX STIJLEN
           ========================================= */
        .checkbox-wrapper {
            margin: 25px 0 35px 0;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-color);
            background: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0; 
        }

        .custom-checkbox.checked {
            background-color: var(--brand-blue);
            border-color: var(--brand-blue);
        }

        .custom-checkbox i {
            color: white;
            font-size: 12px;
            display: none;
        }

        .custom-checkbox.checked i {
            display: block;
        }

        .checkbox-label {
            font-size: 14px;
            color: var(--text-gray);
            line-height: 1.5;
        }

        .submit-btn-blue {
            background-color: var(--brand-blue);
            color: var(--white);
            border: none;
            padding: 16px 35px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 0; 
            cursor: pointer;
            transition: opacity 0.2s ease;
            margin-top: 20px;
        }

        .submit-btn-blue:hover {
            opacity: 0.85;
        }

        .submit-btn-blue:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr; 
            }
            .offerte-section {
                padding: 50px 0 100px 0;
            }
            .submit-btn-blue {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <section class="offerte-section">
            <div class="offerte-container">
                
                <div class="offerte-form-wrapper">
                    <h1 class="page-title">Vrijblijvende offerte aanvragen</h1>
                    
                    <form id="offerteForm" action="#" method="POST" onsubmit="event.preventDefault();">
                        
                        <div class="form-section">
                            <label class="form-label">Waarvoor wilt u een vrijblijvende offerte aanvragen?*</label>
                            <div class="custom-select-wrapper">
                                <select class="form-control" id="dienst" required>
                                    <option value="" disabled selected>Waarvoor wilt u een vrijblijvende offerte aanvragen?</option>
                                    <option value="Objectbeveiliging">Objectbeveiliging</option>
                                    <option value="Winkelsurveillance">Winkelsurveillance</option>
                                    <option value="Evenementen">Evenementen</option>
                                    <option value="Crowd management">Crowd management</option>
                                    <option value="Receptiediensten">Receptiediensten</option>
                                    <option value="BOA">BOA</option>
                                    <option value="Toezichthouder">Toezichthouder</option>
                                    <option value="Brandwacht">Brandwacht</option>
                                    <option value="Straatcoach">Straatcoach</option>
                                    <option value="Verkeersregelaar">Verkeersregelaar</option>
                                    <option value="Overig">Overig</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-section">
                            <label class="form-label">Over uw aanvraag*</label>
                            <textarea class="form-control mb-15" id="specifiekeWensen" placeholder="Benoem hier uw specifieke wensen" required></textarea>
                            <textarea class="form-control" id="aanvullendeVragen" placeholder="Nog aanvullende vragen?"></textarea>
                        </div>

                        <div class="form-section">
                            <label class="form-label">Uw gegevens*</label>
                            
                            <div class="input-group mb-15">
                                <input type="text" class="form-control" id="kvk" placeholder="KVK nummer">
                                <button type="button" class="btn-search" id="btnSearchKvk">Zoeken</button>
                            </div>

                            <input type="text" class="form-control mb-15" id="bedrijfsnaam" placeholder="Bedrijfsnaam">
                            <input type="text" class="form-control mb-15" id="naam" placeholder="Voor- en achternaam" required>
                            <input type="tel" class="form-control mb-15" id="telefoon" placeholder="Telefoonnummer" required>
                            
                            <div class="form-row mb-15">
                                <input type="email" class="form-control" id="email" placeholder="E-mailadres" required>
                                <input type="text" class="form-control" id="postcode" placeholder="Postcode">
                            </div>
                            
                            <div class="form-row">
                                <input type="text" class="form-control" id="huisnr" placeholder="Huisnr.">
                                <input type="text" class="form-control" id="stad" placeholder="Plaats/Stad">
                            </div>
                        </div>

                        <div class="checkbox-wrapper">
                            <div class="checkbox-group" id="offerte-checkbox-trigger">
                                <div class="custom-checkbox" id="offerte-privacy-check">
                                    <i class="fa-solid fa-check"></i>
                                </div>
                                <span class="checkbox-label">Ik ga akkoord met de privacyvoorwaarden van <strong>We Care Safety.</strong> *</span>
                                <input type="checkbox" id="offerte-hidden-privacy" required style="display: none;">
                            </div>
                        </div>

                        

                        <button class="g-recaptcha submit-btn-blue" data-sitekey="6LcZ08gsAAAAAFY6izOFURyVKbJDlH15dP3wzFsr" data-callback='onSubmit' data-action='submit' id="submitBtn">Bericht versturen</button>

                    </form>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="header.js"></script>
    <script src="footer.js"></script>
    <script src="api/offerte-aanvragen.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // 1. Privacy Checkbox Logica
            const trigger = document.getElementById('offerte-checkbox-trigger');
            const visualBox = document.getElementById('offerte-privacy-check');
            const hiddenInput = document.getElementById('offerte-hidden-privacy');

            if (trigger && visualBox && hiddenInput) {
                trigger.addEventListener('click', function() {
                    hiddenInput.checked = !hiddenInput.checked;
                    visualBox.classList.toggle('checked', hiddenInput.checked);
                });
            }

            // 2. KVK Zoek Logica
            const btnSearchKvk = document.getElementById('btnSearchKvk');
            const kvkInput = document.getElementById('kvk');
            const bedrijfsnaamInput = document.getElementById('bedrijfsnaam');
            const stadInput = document.getElementById('stad');

            if(btnSearchKvk && kvkInput) {
                btnSearchKvk.addEventListener('click', function() {
                    const kvkNummer = kvkInput.value.replace(/\s/g, ''); // Spaties weghalen

                    if (kvkNummer === '') {
                        alert('Vul eerst een geldig KvK nummer in.');
                        return;
                    }

                    // Visuele feedback op de knop
                    const originalText = btnSearchKvk.innerText;
                    btnSearchKvk.innerText = 'Zoeken...';
                    btnSearchKvk.disabled = true;

                    // Haal de data op via de API
                    fetch(`https://free.bedrijfsdata.nl/v1.1/kvk?kvk=${kvkNummer}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.status === "ok" && data.found > 0 && data.kvk.length > 0) {
                                // Veld vullen met de resultaten
                                bedrijfsnaamInput.value = data.kvk[0].name || "";
                                stadInput.value = data.kvk[0].city || "";
                                
                                // Succes feedback
                                btnSearchKvk.innerText = 'Gevonden!';
                                bedrijfsnaamInput.style.backgroundColor = '#e8f5e9'; // Heel lichtgroen
                                stadInput.style.backgroundColor = '#e8f5e9';
                            } else {
                                alert('Er is geen bedrijf gevonden met dit KvK nummer.');
                                btnSearchKvk.innerText = originalText;
                            }
                        })
                        .catch(error => {
                            console.error('Error fetching KVK data:', error);
                            alert('Er was een probleem met het ophalen van de gegevens. Controleer uw verbinding.');
                            btnSearchKvk.innerText = originalText;
                        })
                        .finally(() => {
                            // Reset de knop na 2,5 seconden
                            setTimeout(() => {
                                btnSearchKvk.innerText = originalText;
                                btnSearchKvk.disabled = false;
                            }, 2500);
                        });
                });
            }
        });
    </script>

    <script>
    function onSubmit(token) {
        // Controleer eerst of alle verplichte velden zijn ingevuld (HTML5 validatie)
        const form = document.getElementById("offerteForm");
        
        if (form.checkValidity()) {
            // Als alles is ingevuld, roep dan de functie aan die de data naar Power Automate stuurt
            // We geven de reCAPTCHA token mee, zodat je deze later (optioneel) in je backend kunt checken
            verstuurNaarPowerAutomate(token); 
        } else {
            // Laat de browser de standaard foutmeldingen tonen ("Dit veld is verplicht")
            form.reportValidity();
            // Reset de reCAPTCHA zodat de knop weer werkt
            grecaptcha.enterprise.reset();
        }
    }
    </script>
</body>
</html>
