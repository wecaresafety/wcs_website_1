<!DOCTYPE html>
<html lang="nl">
<head>
    <base href="../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedankt voor uw aanvraag | We Care Safety</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            --brand-blue: #4CC6E9;
            --dark-navy: #001D3D;
            --white: #ffffff;
            --text-gray: #57636c;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .thank-you-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 30px;
            text-align: center;
        }

        .thank-you-content {
            max-width: 600px;
        }

        .success-icon {
            font-size: 80px;
            color: var(--brand-blue);
            margin-bottom: 30px;
            /* Een kleine animatie bij binnenkomst */
            animation: scaleUp 0.5s ease-out;
        }

        @keyframes scaleUp {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--dark-navy);
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-home {
            display: inline-block;
            background-color: var(--brand-blue);
            color: var(--white);
            padding: 16px 35px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        .btn-home:hover {
            opacity: 0.85;
        }

        #header-placeholder, #footer-placeholder {
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="thank-you-section">
        <div class="thank-you-content">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Bedankt voor uw aanvraag!</h1>
            <p>
                Wij hebben uw offerte-aanvraag in goede orde ontvangen. 
                Een van onze specialisten zal uw gegevens bekijken en binnen 
                <strong>24 uur</strong> contact met u opnemen.
            </p>
            <a href="index.html" class="btn-home">Terug naar de website</a>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="header.js"></script>
    <script src="footer.js"></script>

</body>
</html>
